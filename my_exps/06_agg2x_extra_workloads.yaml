# ============================================================================
# GLM-4.5-Air @ GB200, 8-GPU AGG 2-replicas baseline,新 3 个 workload
# ----------------------------------------------------------------------------
# 与 05_disagg_open_extra_workloads.yaml 一一对应,用同 workload 当 disagg 的对照
# 同 SLA (TTFT=2000, TPOT=80)
# ============================================================================

exps:
  - exp_agg2x_prefillH
  - exp_agg2x_decodeH
  - exp_agg2x_bothH

_common_agg2x: &common_agg2x
  mode: "patch"
  serving_mode: "agg"
  model_path: "zai-org/GLM-4.5-Air"
  total_gpus: 8
  system_name: "gb200"
  backend_name: "sglang"
  backend_version: "0.5.10"
  database_mode: "HYBRID"
  ttft: 2000.0
  tpot: 80.0
  enable_wideep: false
  config:
    nextn: 0
    nextn_accept_rates: [0, 0, 0, 0, 0]
    worker_config:
      gemm_quant_mode: "bfloat16"
      moe_quant_mode: "bfloat16"
      kvcache_quant_mode: "bfloat16"
      fmha_quant_mode: "bfloat16"
      comm_quant_mode: "half"
      # 锁 4 卡/worker,TP=4 —— 与 04 一致;total_gpus=8 自动起 2 个 replicas
      num_gpu_per_worker: [4]
      tp_list: [4]
      pp_list: [1]
      dp_list: [1]
      moe_tp_list: [1, 2, 4]
      moe_ep_list: [1, 2, 4]

exp_agg2x_prefillH:
  <<: *common_agg2x
  isl: 12000
  osl: 1000
  prefix: 0

exp_agg2x_decodeH:
  <<: *common_agg2x
  isl: 2000
  osl: 4000
  prefix: 0

exp_agg2x_bothH:
  <<: *common_agg2x
  isl: 8000
  osl: 4000
  prefix: 0
