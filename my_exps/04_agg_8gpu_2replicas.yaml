# SPDX-License-Identifier: Apache-2.0
# ============================================================================
# GLM-4.5-Air @ GB200, 8-GPU AGG, 2 replicas of 4-GPU each
# ----------------------------------------------------------------------------
# 目的:补一个"公平对照组" —— 用相同的 8 卡跑 2 个 4-GPU agg 副本
# 这是 disagg(8-GPU) 在 same total_gpus 下的真正对手
# 期望:接近 2× of 01_agg_4gpu_baseline,因为是线性 scaling
# 锁:total_gpus=8, num_gpu_per_worker=4 (强制 4-GPU/replica), tp=4
# ============================================================================

exps:
  - exp_agg2x_short
  - exp_agg2x_mid
  - exp_agg2x_long

_common_agg2x: &common_agg2x
  mode: "patch"
  serving_mode: "agg"
  model_path: "zai-org/GLM-4.5-Air"
  total_gpus: 8
  system_name: "gb200"
  backend_name: "sglang"
  backend_version: "0.5.10"
  database_mode: "HYBRID"
  ttft: 1000.0
  tpot: 60.0
  enable_wideep: false
  config:
    nextn: 0
    nextn_accept_rates: [0, 0, 0, 0, 0]
    worker_config:
      gemm_quant_mode: "bfloat16"
      moe_quant_mode: "bfloat16"
      kvcache_quant_mode: "bfloat16"
      fmha_quant_mode: "bfloat16"
      comm_quant_mode: "half"
      # 锁 4 卡/worker,TP=4 —— 与 01 baseline 完全相同的单 worker 配置
      # total_gpus=8 → aic 会自动起 2 个 replicas
      num_gpu_per_worker: [4]
      tp_list: [4]
      pp_list: [1]
      dp_list: [1]
      moe_tp_list: [1, 2, 4]
      moe_ep_list: [1, 2, 4]

exp_agg2x_short:
  <<: *common_agg2x
  isl: 2000
  osl: 800
  prefix: 500

exp_agg2x_mid:
  <<: *common_agg2x
  isl: 5000
  osl: 1200
  prefix: 3500

exp_agg2x_long:
  <<: *common_agg2x
  isl: 12000
  osl: 1500
  prefix: 10500
